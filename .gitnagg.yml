version: 1
resolution: first-match

rules:
  - severity: error
    message: Stop. This LicenseCLI diff is already too large for one commit. Split it before continuing.
    when:
      or:
        - metric: added
          gte: 140
        - metric: deleted
          gte: 80
        - metric: files
          gte: 8
  - severity: error
    message: Commit now. Keep the next LicenseCLI step in a fresh commit.
    when:
      or:
        - metric: added
          gte: 60
        - metric: deleted
          gte: 30
        - metric: files
          gte: 4
