name: Test

on:
  pull_request:
    branches: ["main"]
    paths:
      - "Sources/**"
      - "Tests/**"
      - "Package.swift"
      - "Package.resolved"
      - "Makefile"
      - ".swiftlint.yml"
      - ".swiftformat"
      - "nestfile.yaml"
      - "scripts/**"
      - ".github/workflows/swift-test.yml"
  push:
    branches: ["main"]
    paths:
      - "Sources/**"
      - "Tests/**"
      - "Package.swift"
      - "Package.resolved"
      - "Makefile"
      - ".swiftlint.yml"
      - ".swiftformat"
      - "nestfile.yaml"
      - "scripts/**"
      - ".github/workflows/swift-test.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    name: SwiftLint (macOS)
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26.2
        run: sudo xcode-select --switch /Applications/Xcode_26.2.app/Contents/Developer

      - name: Bootstrap dev tools (nest)
        run: ./scripts/nest.sh bootstrap nestfile.yaml

      - name: SwiftLint
        run: .nest/bin/swiftlint lint --config .swiftlint.yml --strict

  test:
    name: Test (macOS)
    needs: swiftlint
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26.2
        run: sudo xcode-select --switch /Applications/Xcode_26.2.app/Contents/Developer

      - name: Show Swift version
        run: xcrun swift --version

      - name: Test
        run: swift test
